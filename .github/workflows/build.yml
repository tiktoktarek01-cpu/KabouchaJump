name: Build Flutter APK 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2' # ثبتنا النسخة باش ما يغلطش

      - name: Repair Project
        run: |
          flutter clean
          flutter pub get
          flutter create . --platforms android

      - name: Fix Plugins Namespace
        run: |
          find /home/runner/.pub-cache/hosted/pub.dev -name "build.gradle" -exec sed -i "s/android {/android { namespace 'temp.namespace'/g" {} +
          # هاد السطر يفرض اسم مؤقت على قاع الإضافات باش يخلي السيرفر يجوز

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons
