name: Build Flutter APK 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2'

      - name: Force Project Repair & Fix Name
        run: |
          sed -i 's/name: .*/name: kabouchajump/g' pubspec.yaml
          rm -rf android/
          flutter create . --platforms android --project-name kabouchajump
          flutter pub get
          # نرجعو minSdkVersion لـ 24 باش يرضى ffmpeg
          sed -i 's/flutter.minSdkVersion/24/g' android/app/build.gradle

      - name: Fix Gallery Saver Namespace
        run: |
          find /home/runner/.pub-cache/hosted/pub.dev -name "build.gradle" -exec sed -i "s/android {/android { namespace 'temp.namespace'/g" {} +

      - name: Inject FFmpeg Repositories (Hamida's Idea, Safely)
        run: |
          # نزيدو الروابط اللي جابهم حميدة بصح بطريقة آمنة ما تكسرش الكود
          sed -i '/google()/a \ \ \ \ \ \ \ \ mavenCentral()\n\ \ \ \ \ \ \ \ maven { url "https://www.jitpack.io" }\n\ \ \ \ \ \ \ \ maven { url "https://maven.arthenica.org/" }' android/build.gradle

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KabouchaJump-APK
          path: build/app/outputs/flutter-apk/app-release.apk
