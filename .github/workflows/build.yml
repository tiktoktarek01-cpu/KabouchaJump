name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
      with:
        repository: tiktoktarek01-cpu/KabouchaJump
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17
        java-package: jdk

    - name: Set up Flutter 3.22.2
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: '3.22.2'
        cache: true

    - name: Cache Flutter dependencies
      uses: actions/cache@v5
      with:
        path: |
          ~/.pub-cache
          .dart_tool/package_config.json
          .packages
        key: flutter-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: flutter-

    - name: Prepare Flutter project
      run: |
        sed -i 's/name: .*/name: kabouchajump/g' pubspec.yaml
        flutter clean
        flutter pub get

    - name: Update Android settings
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle || true
        sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle || true
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle || true

    - name: Build APK
      run: flutter build apk --release

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: kabouchajump-${{ github.sha }}.apk
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
