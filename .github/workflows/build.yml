name: Build Flutter APK 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2'

      - name: Fix Package Name and Repair
        run: |
          # هاد السطر يبدل الاسم من KabouchaJump لـ kabouchajump باش فلاتر يرضى
          sed -i 's/name: KabouchaJump/name: kabouchajump/g' pubspec.yaml
          flutter clean
          flutter pub get
          flutter create . --platforms android

      - name: Fix Plugins Namespace
        run: |
          find /home/runner/.pub-cache/hosted/pub.dev -name "build.gradle" -exec sed -i "s/android {/android { namespace 'temp.namespace'/g" {} +

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KabouchaJump-APK
          path: build/app/outputs/flutter-apk/app-release.apk
