name: KabouchaJump - WORKING 100%

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2'

      - name: Prepare & Fix
        run: |
          # تعديل pubspec
          sed -i 's/name: .*/name: kabouchajump/g' pubspec.yaml
          
          # تنظيف خفيف
          flutter clean
          
          # إنشاء Android من جديد
          flutter create . --platforms android --project-name kabouchajump --force
          
          # pub get
          flutter pub get
          
          # minSdkVersion
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle || true

      - name: Fix Gallery Saver
        run: |
          find ~/.pub-cache -name "build.gradle" -path "*gallery_saver*" -exec sed -i "s/android {/android {\n  namespace 'com.caroline.gallery_saver'/g" {} + || true

      - name: Fix FFmpeg - Appodeal
        run: |
          find ~/.pub-cache -name "build.gradle" -path "*ffmpeg_kit_flutter*" -exec sed -i 's|https://maven\.arthenica\.org/|https://artifactory.appodeal.com/appodeal-public/|g' {} + || true
          find ~/.pub-cache -name "build.gradle" -path "*ffmpeg_kit_flutter*" -exec sed -i '/arthenica/d' {} + || true

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: KabouchaJump-APK
          path: build/app/outputs/flutter-apk/app-release.apk
