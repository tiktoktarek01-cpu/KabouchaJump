name: KabouchaJump - FINAL WORKING

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.2'

      - name: Prepare Project
        run: |
          sed -i 's/name: .*/name: kabouchajump/g' pubspec.yaml
          flutter clean
          flutter pub get
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}

      - name: Fix Gallery Saver
        run: |
          find ~/.pub-cache -name "build.gradle" -path "*gallery_saver*" -exec sed -i "s/android {/android {\n  namespace 'com.caroline.gallery_saver'/g" {} + || true

      - name: Fix FFmpeg Appodeal
        run: |
          find ~/.pub-cache -name "build.gradle" -path "*ffmpeg_kit_flutter*" -exec sed -i 's|https://maven\.arthenica\.org/|https://artifactory.appodeal.com/appodeal-public/|g' {} + || true
          find ~/.pub-cache -name "build.gradle" -path "*ffmpeg_kit_flutter*" -exec sed -i '/arthenica/d' {} + || true

      - name: Build APK
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: KabouchaJump-APK
          path: build/app/outputs/flutter-apk/app-release.apk
