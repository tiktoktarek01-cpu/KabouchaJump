name: Build Flutter APK 2026
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # نحينا الكاش هنا باش ما تتبلوكاوش الماكينة

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Android Platform
        run: flutter create . --platforms android 
      - name: Fix SDK for FFmpeg
        run: |
          sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle
          flutter pub get

      - name: Build Release APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KabouchaJump-APK
          path: build/app/outputs/flutter-apk/app-release.apk
