name: Build Flutter APK 2026

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Clean and Get Dependencies
        run: |
          flutter clean
          flutter pub get

      - name: Create Android Platform
        run: flutter create . --platforms android

      - name: Fix Gallery Saver Plugin
        run: |
          sed -i "s/android {/android { namespace 'caroline.com.gallery_saver'/g" /home/runner/.pub-cache/hosted/pub.dev/gallery_saver-*/android/build.gradle

      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons
