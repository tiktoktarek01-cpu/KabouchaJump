
name: Build APK Fixed

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    
    steps:
    - uses: actions/checkout@v4
      with:
        repository: tiktoktarek01-cpu/KabouchaJump
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.2'
        channel: 'stable'
        cache: true

    - name: Cache pub dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}

    - name: Backup app code
      run: |
        mkdir -p backup
        find . -maxdepth 1 -name "lib" -exec cp -r {} backup/ \; || true
        find . -maxdepth 1 -name "assets" -exec cp -r {} backup/ \; || true
        cp pubspec.yaml backup/ || true

    - name: Recreate Flutter project
      run: |
        sed -i 's/name: .*/name: kabouchajump/g' pubspec.yaml
        rm -rf lib android ios test web
        flutter create . --project-name kabouchajump --platforms android
        rm -rf lib/*
        cp -r backup/lib/* lib/ 2>/dev/null || true
        flutter pub get

    - name: Update Android settings
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 24/g' android/app/build.gradle || true
        sed -i 's/compileSdkVersion .*/compileSdkVersion 34/g' android/app/build.gradle || true
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle || true

    - name: Fix FFmpeg dependency
      run: |
        sed -i '/ffmpeg_kit_flutter:/d' pubspec.yaml
        sed -i '/^dependencies:/a\  ffmpeg_kit_flutter_min: ^6.0.3' pubspec.yaml
        flutter pub get

    - name: Build release APK
      run: flutter build apk --release

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kabouchajump-apk
        path: build/app/outputs/flutter-apk/app-release.apk
